<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发送文本</title>
    <link href="/css/style.css" rel="stylesheet">
    <script defer src="/js/receive.js"></script>
</head>
<body>
    <main class="app-shell">
        <section class="transfer-panel">
            <div class="status-row">
                <span id="connection-status" class="status-pill status-muted">正在连接</span>
            </div>
            <h1 class="text-center">发送文本</h1>
            <textarea id="text-input" class="form-control" rows="7" placeholder="请输入要发送的文本"></textarea>
            <button id="send-btn" class="btn btn-primary w-100 mt-3" type="button" disabled>发送</button>
            <div id="send-message" class="alert alert-success mt-3 d-none" role="status">
                发送成功
            </div>
        </section>
    </main>
</body>
</html>
