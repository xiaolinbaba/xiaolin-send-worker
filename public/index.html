<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文本接收</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script defer src="https://umami.thus.chat/script.js" data-website-id="275ee865-9516-4b09-8e08-58980ac17180"></script>
</head>
<body>
    <main class="app-shell">
        <section class="transfer-panel text-center">
            <div class="status-row">
                <span id="connection-status" class="status-pill status-muted">正在创建会话</span>
            </div>
            <h1>扫码将文本发送到此设备</h1>
            <div id="qrcode" class="qr-frame" aria-live="polite"></div>
            <button id="refresh-btn" class="btn btn-outline-secondary btn-sm mt-3" type="button">刷新二维码</button>

            <div id="text-container" class="received-panel d-none">
                <textarea id="received-text" class="form-control" readonly rows="6"></textarea>
                <div class="mt-2">
                    <span id="countdown" class="text-muted">60秒后自动清除</span>
                </div>
                <button id="copy-btn" class="btn btn-primary mt-3" type="button">复制文本</button>
                <div id="copy-message" class="alert alert-success mt-3 d-none">
                    文本已复制到剪贴板
                </div>
            </div>
        </section>
    </main>
    <script src="/js/index.js"></script>
</body>
</html>
