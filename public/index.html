    <link href="/css/style.css" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "安全传输文本内容",
      "url": "https://send.thus.chat/",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "description": "安全方便传输文本信息。使用二维码和 WebSocket 在手机与电脑之间临时传输文本内容。",
      "creator": {
        "@type": "Organization",
        "name": "XIAOLIN AI LAB",

    <script defer src="/js/index.js"></script>

<body>
    <div class="page-background" aria-hidden="true"></div>
    <main class="app-shell">
        <section class="transfer-panel receiver-panel text-center">
            <div class="status-row">
                <span id="connection-status" class="status-pill status-muted">正在创建会话</span>
            </div>
            <h1>安全传输文本内容</h1>
            <p class="page-summary">扫码即可将文本内容<a class="security-link" href="https://github.com/xiaolinbaba/xiaolin-send-worker" target="_blank" rel="noopener noreferrer">安全</a>发送至下面文本框</p>
            <div id="qrcode" class="qr-frame" aria-live="polite"></div>
            <button id="refresh-btn" class="btn btn-outline-secondary btn-sm mt-3" type="button">刷新二维码</button>

            <div id="text-container" class="received-panel">
                <div id="received-text" class="received-text-display" tabindex="0" aria-label="收到的文本预览"></div>
                <div class="mt-2">
                    <span id="countdown" class="text-muted">等待接收文本</span>
                </div>
                <button id="copy-btn" class="btn btn-primary mt-3" type="button" disabled>复制文本</button>
                <div id="copy-message" class="alert alert-success message-slot mt-3 d-none">
                    文本已复制到剪贴板
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer">

    </footer>
